<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Mayur Pro</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=1470') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: -1; }
        .login-card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(20px); padding: 40px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); width: 350px; text-align: center; }
        h2 { color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        .login-btn { width: 100%; padding: 12px; margin-top: 20px; background: linear-gradient(90deg, #00d4ff, #0055ff); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="login-card">
        <h2>MAYUR PRO</h2>
        <p>Enter your credentials</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>
        <p style="margin-top:12px; color:#00d4ff; font-size:14px;">
            Don't have an account? <a href="register.html" style="color:#00d4ff; text-decoration:none;">Sign Up</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // --- THE KEY STEP ---
                    // Save the username to the browser's memory
                    localStorage.setItem('userName', username); 
                    
                    alert("✅ Welcome back, " + username + "!");
                    window.location.href = 'dashboard.html'; 
                } else {
                    alert("❌ " + (data.message || "Invalid credentials"));
                }
            } catch (error) {
                alert("🛑 Server connection failed!");
            }
        });
    </script>
</body>
</html>
